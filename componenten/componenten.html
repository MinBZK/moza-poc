<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOx design systeem</title>
    <link rel="stylesheet" href="../style/style.css">
    <meta name="description" content="Rijkshuisstijl voorbeeld met design tokens">
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="192x192" href="../assets/favicon/touch-icon.png">
    <link rel="apple-touch-icon" href="../assets/favicon/apple-touch-icon.png">
    <!--<meta http-equiv="refresh" content="1"> <!-- even om te tesetn zonder een locale server op te moeten zetten -->
</head>

<body>

<header>
    <figure class="logo">
        <img src="../assets/images/beeldmerk-rijksoverheid.svg" alt="">
    </figure>
</header>

<main>
    <form>

        <fieldset>

            <button type="button">Standaard primaire knop</button>

            <div class="space-md"></div>
            
            <button type="reset">Reset knop</button>
            
            <div class="space-md"></div>
            
            <button type="submit">Submit knop</button>
            
            <div class="space-md"></div>
            
            <button disabled>Inactieve knop</button>
            
            <div class="space-md"></div>
            
            <button class="negative">Destructieve actie</button>
            
            <div class="space-md"></div>
            
            <button type="button">
                Knop met <b>tekst</b> <i>stijlen</i>
            </button>
            
            <div class="space-md"></div>
            
            <button type="button">
                <span>⚑</span> Knop met icoon voor tekst
            </button>
            
            <div class="space-md"></div>
            
            <!-- <button type="button">
                Knop met icoon achter tekst <span>☀︎</span>
            </button> -->
            
            <div class="space-md"></div>

            <button type="button" class="secondary">Secundaire knop</button>

        </fieldset>

        <fieldset>
            <legend>Tekstinvoer</legend>

            <div class="space-16"></div>

            <label for="input-text">Standaard tekstinvoerveld</label>
            <div class="form-helper-text" id="input-text--helper-text">Optionele ondersteunende help tekst indien nodig, bijvoorbeeld een hint over het verwachte formaat van invoer.</div>
            <input type="text" id="input-text" aria-describedby="input-text--helper-text">

            <div class="space-16"></div>

            <label for="input-email">E-mailadres</label>
            <div class="form-helper-text" id="emailadress--helper-text">Optionele ondersteunende help tekst indien nodig, bijvoorbeeld een hint over het verwachte formaat van invoer.</div>
            <input type="email" id="input-email" aria-describedby="emailadress--helper-text">
          
        </fieldset>
    </form>
</main>

<footer></footer>
    
</body>
</html>
